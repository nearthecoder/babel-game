<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0a1a;font-family:'Nunito',sans-serif;color:#fff;overflow:hidden;height:100vh}
#gc{position:relative;width:100vw;height:100vh;overflow:hidden}
canvas{position:absolute;top:0;left:0}
#ui{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:10;pointer-events:none;background:linear-gradient(rgba(0,0,0,0.7),transparent)}
.sbox{background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;padding:5px 12px;display:flex;flex-direction:column;align-items:center}
.sval{font-family:'Cinzel',sans-serif;font-size:20px;line-height:1.1}
.slbl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-transform:uppercase}
#hbox{display:flex;align-items:center;gap:6px;background:rgba(100,0,0,0.4);border:1.5px solid rgba(220,50,50,0.3);border-radius:10px;padding:5px 12px}
#hc{font-family:'Cinzel',sans-serif;font-size:22px;color:#ff6b6b}
#xpbar-wrap{position:absolute;top:56px;left:16px;right:16px;z-index:10;pointer-events:none}
#xpbar-bg{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:6px;height:8px;overflow:hidden}
#xpbar{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7,#c084fc);border-radius:6px;transition:width 0.4s}
#xplbl{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:3px}
#shop{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;display:flex;justify-content:center;gap:6px;z-index:10;background:linear-gradient(transparent,rgba(0,0,0,0.9))}
.tbtn{border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:6px 10px;cursor:pointer;transition:all 0.18s;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:66px;font-family:'Nunito',sans-serif;position:relative;background:rgba(0,0,0,0.4)}
.tbtn:hover:not(.locked):not(.cant){transform:translateY(-3px);border-color:rgba(255,255,255,0.5)}
.tbtn.selected{border-color:#f1c40f;box-shadow:0 0 14px rgba(241,196,15,0.5)}
.tbtn.locked{opacity:0.35;cursor:not-allowed;filter:grayscale(0.8)}
.tbtn.cant{opacity:0.4;cursor:not-allowed}
.ticon{font-size:20px;line-height:1}.tname{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,0.65);text-transform:uppercase;font-weight:700}.tcost{font-size:12px;font-weight:800;color:#f1c40f}
.lock-badge{position:absolute;top:-6px;right:-6px;background:#7c3aed;border-radius:50%;width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center}
.tier-badge{position:absolute;top:-6px;left:-6px;background:#374151;border-radius:4px;padding:1px 4px;font-size:8px;color:#9ca3af;font-weight:700}

#overlay{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85)}
#start-card{background:linear-gradient(135deg,#0d0a1a,#1e1040);border:2px solid rgba(124,58,237,0.4);border-radius:24px;padding:32px 40px;max-width:520px;width:92%;text-align:center;box-shadow:0 0 80px rgba(124,58,237,0.2)}
#start-card h1{font-family:'Cinzel',sans-serif;font-size:64px;letter-spacing:6px;background:linear-gradient(135deg,#a78bfa,#f472b6,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
#start-card .tagline{font-size:13px;color:rgba(255,255,255,0.45);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px}
.section-title{font-family:'Cinzel',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:10px}
#lang-row,#diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.opt-btn{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 18px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.7);transition:all 0.2s}
.opt-btn.on{background:rgba(124,58,237,0.25);border-color:#a78bfa;color:#fff}
#playbtn{background:linear-gradient(135deg,#7c3aed,#db2777);border:none;border-radius:50px;padding:14px 52px;font-family:'Cinzel',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;cursor:pointer;box-shadow:0 4px 24px rgba(124,58,237,0.5);transition:all 0.2s;margin-top:8px}
#playbtn:hover{transform:scale(1.04);box-shadow:0 6px 32px rgba(124,58,237,0.7)}

#learn-panel,#q-panel{position:absolute;inset:0;z-index:35;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8)}
.panel-card{background:linear-gradient(135deg,#0d0a1a,#1e1040);border:2px solid rgba(124,58,237,0.35);border-radius:20px;padding:26px 32px;max-width:460px;width:90%;text-align:center}
.lang-badge{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.35);border-radius:50px;padding:3px 14px;font-size:9px;letter-spacing:2px;color:#a78bfa;text-transform:uppercase;display:inline-block;margin-bottom:10px}
.big-word{font-family:'Cinzel',sans-serif;font-size:48px;color:#fff;line-height:1;margin-bottom:4px}
.rom-text{font-size:15px;color:rgba(255,255,255,0.35);font-style:italic;margin-bottom:10px;transition:opacity 0.3s}
.meaning-text{font-size:26px;font-weight:800;color:#a78bfa;margin-bottom:14px}
.speak-btn{background:rgba(124,58,237,0.2);border:1.5px solid rgba(124,58,237,0.35);border-radius:50px;padding:6px 18px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:#a78bfa;cursor:pointer;margin-bottom:14px;transition:all 0.2s}
.speak-btn:hover{background:rgba(124,58,237,0.4)}
.prog-text{font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:12px;letter-spacing:1px}
.next-btn{background:linear-gradient(135deg,#7c3aed,#db2777);border:none;border-radius:50px;padding:11px 34px;font-family:'Cinzel',sans-serif;font-size:17px;color:#fff;cursor:pointer;transition:all 0.2s}
.next-btn:hover{transform:scale(1.03)}
#q-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.cbtn{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:11px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#fff;transition:all 0.2s}
.cbtn:hover{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.6)}
.cbtn.ok{background:rgba(46,213,115,0.15);border-color:#2ed573;color:#2ed573}
.cbtn.no{background:rgba(231,76,60,0.15);border-color:#e74c3c;color:#e74c3c}
#q-feedback{font-size:14px;color:#f1c40f;font-weight:800;min-height:20px;margin-bottom:6px}
#q-streak{font-size:12px;color:rgba(255,255,255,0.4)}
#q-prog{font-size:10px;color:rgba(255,255,255,0.25);margin-top:6px;letter-spacing:1px}

#wave-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',sans-serif;font-size:72px;color:#fff;text-align:center;z-index:20;opacity:0;pointer-events:none;transition:opacity 0.4s;text-shadow:0 0 40px rgba(124,58,237,0.9),0 0 80px rgba(124,58,237,0.4)}
#hint{position:absolute;top:76px;left:50%;transform:translateX(-50%);background:rgba(124,58,237,0.85);border-radius:50px;padding:5px 16px;font-size:11px;font-weight:700;z-index:15;pointer-events:none;display:none;white-space:nowrap}
#music-btn{position:absolute;top:10px;right:10px;z-index:15;background:rgba(0,0,0,0.5);border:1.5px solid rgba(255,255,255,0.12);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}

#upgrade-panel{position:absolute;inset:0;z-index:36;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.85)}
#upg-card{background:linear-gradient(135deg,#0d0a1a,#1e1040);border:2px solid rgba(124,58,237,0.4);border-radius:20px;padding:24px 28px;max-width:440px;width:90%}
#upg-title{font-family:'Cinzel',sans-serif;font-size:22px;margin-bottom:4px;color:#a78bfa}
#upg-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:18px;letter-spacing:1px}
.upg-path{margin-bottom:14px}
.upg-path-name{font-family:'Cinzel',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-bottom:6px}
.upg-levels{display:flex;gap:6px}
.upg-lvl{flex:1;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:10px;font-weight:700;position:relative}
.upg-lvl:hover:not(.bought):not(.locked-upg){border-color:#a78bfa;background:rgba(124,58,237,0.15)}
.upg-lvl.bought{background:rgba(46,213,115,0.12);border-color:#2ed573;color:#2ed573;cursor:default}
.upg-lvl.locked-upg{opacity:0.3;cursor:not-allowed}
.upg-lvl .cost{font-size:9px;color:#f1c40f;margin-top:3px}
#upg-close{background:none;border:1.5px solid rgba(255,255,255,0.15);border-radius:50px;padding:8px 24px;font-family:'Nunito',sans-serif;font-size:13px;color:rgba(255,255,255,0.5);cursor:pointer;margin-top:8px;transition:all 0.2s;width:100%}
#upg-close:hover{border-color:rgba(255,255,255,0.4);color:#fff}
.sell-btn{background:rgba(231,76,60,0.15);border:1.5px solid rgba(231,76,60,0.3);border-radius:8px;padding:6px 12px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#e74c3c;cursor:pointer;margin-top:8px;transition:all 0.2s;width:100%}
.sell-btn:hover{background:rgba(231,76,60,0.3)}

#go{position:absolute;inset:0;background:rgba(0,0,0,0.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:14px}
#go h2{font-family:'Cinzel',sans-serif;font-size:60px;color:#e74c3c;text-shadow:0 0 30px rgba(231,76,60,0.5)}
#go .stats{font-size:16px;color:rgba(255,255,255,0.5);text-align:center;line-height:2}
#go button{background:linear-gradient(135deg,#7c3aed,#db2777);border:none;border-radius:50px;padding:13px 40px;font-family:'Cinzel',sans-serif;font-size:19px;color:#fff;cursor:pointer;letter-spacing:2px}
#notif{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:45;font-family:'Cinzel',sans-serif;font-size:18px;color:#f1c40f;text-shadow:0 0 20px rgba(241,196,15,0.6);opacity:0;transition:opacity 0.4s;pointer-events:none;white-space:nowrap;text-align:center}
</style>
</head>
<body>
<div id="gc">
  <canvas id="bgc"></canvas>
  <canvas id="main"></canvas>

  <div id="ui">
    <div style="display:flex;gap:8px">
      <div class="sbox"><span class="sval" id="ui-coins" style="color:#f1c40f">100</span><span class="slbl">Gold</span></div>
      <div class="sbox"><span class="sval" id="ui-wave" style="color:#a78bfa">1</span><span class="slbl">Wave</span></div>
      <div class="sbox"><span class="sval" id="ui-score" style="color:#34d399">0</span><span class="slbl">Score</span></div>
      <div class="sbox"><span class="sval" id="ui-plvl" style="color:#fb923c">1</span><span class="slbl">Level</span></div>
    </div>
    <div id="hbox"><span style="font-size:18px">❤️</span><span id="hc">20</span></div>
  </div>
  <div id="xpbar-wrap">
    <div id="xplbl">XP — Level 1</div>
    <div id="xpbar-bg"><div id="xpbar" style="width:0%"></div></div>
  </div>
  <div id="hint">Click off the path to place</div>
  <div id="wave-flash"></div>
  <div id="music-btn" onclick="toggleMusic()">🎵</div>
  <div id="notif"></div>

  <div id="shop">
    <button class="tbtn" id="btn-ranger" onclick="tryPick('ranger')">
      <span class="tier-badge">T1</span><span class="ticon">🏹</span><span class="tname">Ranger</span><span class="tcost">60g</span>
    </button>
    <button class="tbtn" id="btn-spark" onclick="tryPick('spark')">
      <span class="tier-badge">T1</span><span class="ticon">⚡</span><span class="tname">Spark</span><span class="tcost">80g</span>
    </button>
    <button class="tbtn" id="btn-sage" onclick="tryPick('sage')">
      <span class="tier-badge">T1</span><span class="ticon">🧊</span><span class="tname">Sage</span><span class="tcost">90g</span>
    </button>
    <button class="tbtn locked" id="btn-bomber" onclick="tryPick('bomber')">
      <span class="tier-badge">T2</span><span class="lock-badge">🔒</span><span class="ticon">💣</span><span class="tname">Bomber</span><span class="tcost">100g</span>
    </button>
    <button class="tbtn locked" id="btn-phantom" onclick="tryPick('phantom')">
      <span class="tier-badge">T2</span><span class="lock-badge">🔒</span><span class="ticon">👁️</span><span class="tname">Phantom</span><span class="tcost">120g</span>
    </button>
    <button class="tbtn locked" id="btn-alchemist" onclick="tryPick('alchemist')">
      <span class="tier-badge">T2</span><span class="lock-badge">🔒</span><span class="ticon">⚗️</span><span class="tname">Alchemist</span><span class="tcost">130g</span>
    </button>
    <button class="tbtn locked" id="btn-warlord" onclick="tryPick('warlord')">
      <span class="tier-badge">T3</span><span class="lock-badge">🔒</span><span class="ticon">⚔️</span><span class="tname">Warlord</span><span class="tcost">180g</span>
    </button>
    <button class="tbtn locked" id="btn-sorcerer" onclick="tryPick('sorcerer')">
      <span class="tier-badge">T3</span><span class="lock-badge">🔒</span><span class="ticon">🔮</span><span class="tname">Sorcerer</span><span class="tcost">200g</span>
    </button>
    <button class="tbtn locked" id="btn-dragon" onclick="tryPick('dragon')">
      <span class="tier-badge">T4</span><span class="lock-badge">🔒</span><span class="ticon">🐉</span><span class="tname">Dragon</span><span class="tcost">280g</span>
    </button>
  </div>

  <div id="overlay">
    <div id="start-card">
      <h1>BABEL</h1>
      <div class="tagline">The Language Defense</div>
      <div class="section-title">Choose Language</div>
      <div id="lang-row">
        <button class="opt-btn on" onclick="setLang('korean',this)">🇰🇷 Korean</button>
        <button class="opt-btn" onclick="setLang('japanese',this)">🇯🇵 Japanese</button>
      </div>
      <div class="section-title">Difficulty</div>
      <div id="diff-row">
        <button class="opt-btn on" onclick="setDiff('basic',this)">⚔️ Basic</button>
        <button class="opt-btn" onclick="setDiff('intermediate',this)">🛡️ Intermediate</button>
        <button class="opt-btn" onclick="setDiff('fluent',this)">👑 Fluent</button>
      </div>
      <button id="playbtn" onclick="startGame()">BEGIN QUEST</button>
    </div>
  </div>

  <div id="learn-panel">
    <div class="panel-card">
      <div id="lc-badge" class="lang-badge">🇰🇷 Korean</div>
      <div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:12px">Study This Word</div>
      <div id="lc-word" class="big-word">안녕하세요</div>
      <div id="lc-rom" class="rom-text">annyeonghaseyo</div>
      <div id="lc-meaning" class="meaning-text">Hello</div>
      <button class="speak-btn" onclick="speakLearn()">🔊 Hear Pronunciation</button>
      <div id="lc-prog" class="prog-text">Word 1 of 5</div>
      <button class="next-btn" id="lc-next" onclick="nextLearn()">Got it →</button>
    </div>
  </div>

  <div id="q-panel">
    <div class="panel-card">
      <div id="q-badge" class="lang-badge">🇰🇷 Korean</div>
      <div id="q-word" class="big-word">안녕하세요</div>
      <div id="q-rom" class="rom-text" style="opacity:0">annyeonghaseyo</div>
      <button class="speak-btn" onclick="speakQ()" style="margin-bottom:8px">🔊 Listen</button>
      <div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:12px">What does this mean?</div>
      <div id="q-choices"></div>
      <div id="q-feedback"></div>
      <div id="q-streak"></div>
      <div id="q-prog"></div>
    </div>
  </div>

  <div id="upgrade-panel">
    <div id="upg-card">
      <div id="upg-title">Ranger</div>
      <div id="upg-sub">Kills: 0 · Tower XP: 0</div>
      <div id="upg-paths"></div>
      <button class="sell-btn" id="sell-btn">Sell Tower</button>
      <button id="upg-close" onclick="closeUpgrade()">Close</button>
    </div>
  </div>

  <div id="go">
    <h2>DEFEATED</h2>
    <p class="stats" id="go-stats"></p>
    <button onclick="restartGame()">RISE AGAIN</button>
  </div>
</div>

<script>
// ─── polyfill roundRect for older browsers ───
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);
    this.closePath();return this;
  };
}

function makePath(W,H){
  return[
    {x:-60,y:H*.26},{x:W*.11,y:H*.26},{x:W*.11,y:H*.63},
    {x:W*.32,y:H*.63},{x:W*.32,y:H*.16},{x:W*.56,y:H*.16},
    {x:W*.56,y:H*.52},{x:W*.74,y:H*.52},{x:W*.74,y:H*.3},
    {x:W*.91,y:H*.3},{x:W+60,y:H*.3}
  ];
}

function initCanvas(){
  mc=document.getElementById('main');
  bgc2=document.getElementById('bgc');
  W=mc.width=bgc2.width=window.innerWidth;
  H=mc.height=bgc2.height=window.innerHeight;
  ctx2=mc.getContext('2d');
  bgCtx2=bgc2.getContext('2d');
  PATH=makePath(W,H);
  drawBG();

  mc.addEventListener('mousemove',e=>{
    const r=mc.getBoundingClientRect();
    mouseX=e.clientX-r.left;
    mouseY=e.clientY-r.top;
  });

  mc.addEventListener('click',e=>{
    const r=mc.getBoundingClientRect();
    const x=e.clientX-r.left,y=e.clientY-r.top;
    if(placing&&pickType){
      if(!isOnPath(x,y)){
        const def=TOWERS[pickType];
        const pathCount=(UPGRADES[pickType]||[]).length;
        towers.push({
          x,y,type:pickType,cd:0,kills:0,
          upgrades:Array.from({length:pathCount},()=>[0])
        });
        coins-=def.cost;
        updateUI();
        renderShop();
        spawnParts(x,y,def.col,10);
      }
      placing=false;pickType=null;mouseX=0;mouseY=0;
      document.getElementById('hint').style.display='none';
      document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('selected'));
      return;
    }
    const clicked=towers.find(t=>{
      const dx=t.x-x,dy=t.y-y;
      return Math.sqrt(dx*dx+dy*dy)<24;
    });
    if(clicked){openUpgrade(clicked);}
    else if(selectedTower){closeUpgrade();}
  });
}

function drawBG(){
  bgCtx2.fillStyle='#0d0a1a';bgCtx2.fillRect(0,0,W,H);
  for(let i=0;i<80;i++){
    const x=Math.random()*W,y=Math.random()*H;
    const r=Math.random()*1.5+.3;
    const a=Math.random()*.15+.03;
    bgCtx2.fillStyle=`rgba(${Math.random()<.5?'167,139,250':'244,114,182'},${a})`;
    bgCtx2.beginPath();bgCtx2.arc(x,y,r,0,Math.PI*2);bgCtx2.fill();
  }
  bgCtx2.save();bgCtx2.lineCap='round';bgCtx2.lineJoin='round';
  bgCtx2.strokeStyle='rgba(124,58,237,.08)';bgCtx2.lineWidth=60;
  bgCtx2.beginPath();bgCtx2.moveTo(PATH[0].x,PATH[0].y);
  PATH.forEach((p,i)=>{if(i)bgCtx2.lineTo(p.x,p.y);});bgCtx2.stroke();
  bgCtx2.strokeStyle='rgba(30,16,64,.98)';bgCtx2.lineWidth=44;
  bgCtx2.beginPath();bgCtx2.moveTo(PATH[0].x,PATH[0].y);
  PATH.forEach((p,i)=>{if(i)bgCtx2.lineTo(p.x,p.y);});bgCtx2.stroke();
  bgCtx2.strokeStyle='rgba(124,58,237,.18)';bgCtx2.lineWidth=40;bgCtx2.setLineDash([24,16]);
  bgCtx2.beginPath();bgCtx2.moveTo(PATH[0].x,PATH[0].y);
  PATH.forEach((p,i)=>{if(i)bgCtx2.lineTo(p.x,p.y);});bgCtx2.stroke();
  bgCtx2.setLineDash([]);bgCtx2.restore();
}

function setLang(l,el){lang=l;document.querySelectorAll('#lang-row .opt-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');}
function setDiff(d,el){diff=d;document.querySelectorAll('#diff-row .opt-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');}

function startGame(){
  document.getElementById('overlay').style.display='none';
  gs='playing';coins=250;score=0;hearts=20;wave=1;playerXP=0;playerLevel=1;
  enemies=[];towers=[];bullets=[];parts=[];streak=0;
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioCtx.resume();}catch(e){}
  }
  updateUI();updateXPBar();renderShop();
  stopMusic();
  startMusic();
  showWave(wave,()=>{if(wave===1)startWave2();else startLearn();});
  if(animId)cancelAnimationFrame(animId);
  last=performance.now();
  gameLoop(last);
}

function restartGame(){
  document.getElementById('go').style.display='none';
  startGame();
}

function getVocab(){return VOCAB[lang][diff];}

function startLearn(){
  const pool=[...getVocab()];
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const count=Math.min(2+Math.floor(wave/3),4);
  learnWords=pool.slice(0,count);learnIdx=0;
  showLearnCard();
}

function showLearnCard(){
  document.getElementById('learn-panel').style.display='flex';
  const w=learnWords[learnIdx];
  document.getElementById('lc-badge').textContent=lang==='korean'?'🇰🇷 Korean':'🇯🇵 Japanese';
  document.getElementById('lc-word').textContent=w.w;
  document.getElementById('lc-rom').textContent=w.r;
  document.getElementById('lc-meaning').textContent=w.m;
  document.getElementById('lc-prog').textContent=`Word ${learnIdx+1} of ${learnWords.length}`;
  document.getElementById('lc-next').textContent=learnIdx<learnWords.length-1?'Got it →':'Start Quiz →';
  setTimeout(()=>nextLearn(),1800);
}

function speakLearn(){speak(learnWords[learnIdx].w);}
function speakQ(){if(qCur)speak(qCur.w);}

function speak(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='korean'?'ko-KR':'ja-JP';
  u.rate=0.75;u.pitch=1.05;
  const voices=speechSynthesis.getVoices();
  const preferred=voices.find(v=>v.lang.startsWith(lang==='korean'?'ko':'ja')&&v.localService);
  if(preferred)u.voice=preferred;
  speechSynthesis.speak(u);
}

function nextLearn(){
  learnIdx++;
  if(learnIdx>=learnWords.length){document.getElementById('learn-panel').style.display='none';startQuiz();}
  else showLearnCard();
}

function startQuiz(){
  if(wave%2===0){startWave2();return;}
  qLeft=learnWords.length;
  qWords=[...learnWords];
  for(let i=qWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qWords[i],qWords[j]]=[qWords[j],qWords[i]];}
  showQ();
}

function showQ(){
  if(qLeft<=0){document.getElementById('q-panel').style.display='none';startWave2();return;}
  if(!qWords.length){
    qWords=[...learnWords];
    for(let i=qWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qWords[i],qWords[j]]=[qWords[j],qWords[i]];}
  }
  qCur=qWords.pop();
  document.getElementById('q-panel').style.display='flex';
  document.getElementById('q-badge').textContent=lang==='korean'?'🇰🇷 Korean':'🇯🇵 Japanese';
  document.getElementById('q-word').textContent=qCur.w;
  document.getElementById('q-rom').textContent=qCur.r;
  document.getElementById('q-rom').style.opacity='0';
  document.getElementById('q-feedback').textContent='';
  document.getElementById('q-prog').textContent=`${learnWords.length-qLeft+1} of ${learnWords.length}`;
  const pool=getVocab();
  const wrongs=[...qCur.x];
  pool.forEach(v=>{if(v.m!==qCur.m&&wrongs.indexOf(v.m)<0)wrongs.push(v.m);});
  for(let i=wrongs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[wrongs[i],wrongs[j]]=[wrongs[j],wrongs[i]];}
  const ch=[qCur.m,...wrongs.slice(0,3)].sort(()=>Math.random()-.5);
  const ce=document.getElementById('q-choices');ce.innerHTML='';
  ch.forEach(c=>{
    const b=document.createElement('button');b.className='cbtn';b.textContent=c;
    b.onclick=()=>answer(c,b);ce.appendChild(b);
  });
  document.getElementById('q-streak').textContent=streak>1?`${streak} streak 🔥`:'';
}

function answer(ans,btn){
  document.querySelectorAll('.cbtn').forEach(b=>b.onclick=null);
  document.getElementById('q-rom').style.opacity='0.6';
  const ok=ans===qCur.m;
  if(ok){
    btn.classList.add('ok');streak++;
    const bonus=streak>=5?35:streak>=3?25:streak>=2?18:12;
    coins+=bonus;score+=bonus*wave;
    const xpGain=streak>=3?20:10;
    addXP(xpGain);
    document.getElementById('q-feedback').textContent=`+${bonus} gold${streak>=2?' (streak!)':''}`;
    updateUI();
  } else {
    btn.classList.add('no');streak=0;
    document.querySelectorAll('.cbtn').forEach(b=>{if(b.textContent===qCur.m)b.classList.add('ok');});
    document.getElementById('q-feedback').textContent='Not quite — study the romanization above';
  }
  document.getElementById('q-streak').textContent=streak>1?`${streak} streak 🔥`:'';
  qLeft--;
  setTimeout(showQ,900);
}

function addXP(amount){
  playerXP+=amount;
  const nextLvl=PLAYER_LEVELS[playerLevel]||999999;
  if(playerXP>=nextLvl&&playerLevel<PLAYER_LEVELS.length-1){
    playerXP-=nextLvl;playerLevel++;
    showNotif(`LEVEL UP! You are now Level ${playerLevel}`);
    renderShop();
  }
  updateXPBar();
}

function updateXPBar(){
  const next=PLAYER_LEVELS[playerLevel]||1;
  const pct=Math.min(100,(playerXP/next)*100);
  document.getElementById('xpbar').style.width=pct+'%';
  document.getElementById('xplbl').textContent=`XP — Level ${playerLevel} (${playerXP}/${next})`;
  document.getElementById('ui-plvl').textContent=playerLevel;
}

function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',3000);
}

function renderShop(){
  Object.keys(TOWERS).forEach(type=>{
    const def=TOWERS[type];
    const btn=document.getElementById('btn-'+type);
    if(!btn)return;
    const unlocked=!def.unlockLvl||playerLevel>=def.unlockLvl;
    const canAfford=coins>=def.cost;
    const lockEl=btn.querySelector('.lock-badge');
    if(unlocked){
      btn.classList.remove('locked');
      if(lockEl)lockEl.style.display='none';
      btn.className='tbtn'+(canAfford?'':' cant')+(btn.classList.contains('selected')?' selected':'');
    } else {
      btn.classList.add('locked');
      if(lockEl){lockEl.style.display='flex';lockEl.textContent='Lv'+def.unlockLvl;}
    }
  });
}

function startWave2(){waveOn=true;spawnLeft=8+wave*4;spawnTimer=0;spawnIdx=0;}

function spawnE(dt){
  if(!waveOn||spawnIdx>=spawnLeft)return;
  spawnTimer+=dt;
  if(spawnTimer>=Math.max(320,1000-wave*50)){
    spawnTimer=0;
    const spd=50+wave*10+Math.random()*20;
    const baseHp=40+wave*22;
    const roll=Math.random();
    const hp=baseHp*(roll<.12?3.2:roll<.28?1.8:1);
    const voc=getVocab()[Math.floor(Math.random()*getVocab().length)];
    enemies.push({
      x:PATH[0].x,y:PATH[0].y,pi:0,
      spd,hp,maxHp:hp,
      word:voc.w,sz:hp>120?26:hp>70?20:15,
      col:ENEMY_COLS[Math.floor(Math.random()*ENEMY_COLS.length)],
      slow:1,slowT:0
    });
    spawnIdx++;
  }
}

function updE(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.slowT>0){e.slowT-=dt;}else{e.slow=1;}
    if(e.pi>=PATH.length-1){
      enemies.splice(i,1);
      hearts--;
      document.getElementById('hc').textContent=hearts;
      spawnParts(W*.91,H*.3,'#e74c3c',10);
      if(hearts<=0){gameOver();return;}
      continue;
    }
    const tgt=PATH[e.pi+1];
    const dx=tgt.x-e.x,dy=tgt.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
    const mv=e.spd*e.slow*(dt/1000);
    if(dist<=mv){e.x=tgt.x;e.y=tgt.y;e.pi++;}
    else{e.x+=dx/dist*mv;e.y+=dy/dist*mv;}
  }
  if(waveOn&&spawnIdx>=spawnLeft&&!enemies.length){
    waveOn=false;wave++;
    addXP(15+wave*3);
    updateUI();
    showWave(wave,()=>{if(wave===1)startWave2();else startLearn();});
  }
}

function getTowerStats(t){
  const base={...TOWERS[t.type]};
  if(!t.upgrades)t.upgrades=[];
  const paths=UPGRADES[t.type]||[];
  paths.forEach((path,pi)=>{
    const currentLvl=(t.upgrades[pi]&&t.upgrades[pi][0])||0;
    for(let l=0;l<currentLvl;l++){
      const eff=path.levels[l].effect;
      if(eff.range!=null)base.range+=eff.range;
      if(eff.dmg!=null)base.dmg+=eff.dmg;
      if(eff.rate!=null)base.rate=Math.max(80,base.rate+eff.rate);
      if(eff.splash!=null)base.splash+=eff.splash;
      if(eff.slow!=null)base.slow=Math.min(0.95,base.slow+eff.slow);
      if(eff.multi!=null)base.multi=(base.multi||1)+eff.multi;
    }
  });
  return base;
}

function updT(dt){
  towers.forEach(t=>{
    t.cd=(t.cd||0)-dt;
    if(t.cd>0)return;
    const stats=getTowerStats(t);
    let tgt=null,best=-1;
    enemies.forEach(e=>{
      const dx=e.x-t.x,dy=e.y-t.y;
      if(Math.sqrt(dx*dx+dy*dy)<=stats.range&&e.pi>best){best=e.pi;tgt=e;}
    });
    if(tgt){
      t.cd=stats.rate;
      const multi=stats.multi||1;
      const targets=multi>1
        ?[tgt,...enemies.filter(e=>e!==tgt&&Math.sqrt((e.x-t.x)**2+(e.y-t.y)**2)<=stats.range).slice(0,multi-1)]
        :[tgt];
      targets.forEach(target=>{
        bullets.push({x:t.x,y:t.y,tgt:target,spd:340,dmg:stats.dmg,col:stats.col,splash:stats.splash,slow:stats.slow,sz:stats.splash>0?8:4,twrRef:t});
      });
    }
  });
}

function updB(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(!b.tgt||b.tgt.hp<=0){bullets.splice(i,1);continue;}
    const dx=b.tgt.x-b.x,dy=b.tgt.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
    const mv=b.spd*(dt/1000);
    if(dist<=mv||dist<6){
      if(b.splash>0){
        enemies.forEach(e=>{
          if(Math.sqrt((e.x-b.tgt.x)**2+(e.y-b.tgt.y)**2)<=b.splash){
            e.hp-=b.dmg;spawnParts(e.x,e.y,b.col,3);
            if(b.slow>0){e.slow=1-b.slow;e.slowT=1500;}
          }
        });
        spawnParts(b.tgt.x,b.tgt.y,b.col,14);
      } else {
        b.tgt.hp-=b.dmg;
        if(b.slow>0){b.tgt.slow=1-b.slow;b.tgt.slowT=1500;}
        spawnParts(b.tgt.x,b.tgt.y,b.col,4);
      }
      bullets.splice(i,1);
      for(let j=enemies.length-1;j>=0;j--){
        if(enemies[j].hp<=0){
          score+=15*wave;addXP(8);updateUI();
          spawnParts(enemies[j].x,enemies[j].y,'#a78bfa',14);
          if(b.twrRef){b.twrRef.kills=(b.twrRef.kills||0)+1;}
          enemies.splice(j,1);
        }
      }
      continue;
    }
    b.x+=dx/dist*mv;b.y+=dy/dist*mv;
  }
}

function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*100+40;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life:1,sz:Math.random()*3+1});
  }
}

function updP(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx*(dt/1000);p.y+=p.vy*(dt/1000);
    p.vy+=80*(dt/1000);p.life-=dt/450;
    if(p.life<=0)parts.splice(i,1);
  }
}

function drawTowerShape(ctx,t,x,y,def){
  ctx.save();
  ctx.shadowColor=def.col;ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(x,y,def.r+6,0,Math.PI*2);
  ctx.fillStyle=def.col+'18';ctx.fill();
  ctx.beginPath();ctx.arc(x,y,def.r+2,0,Math.PI*2);
  ctx.fillStyle=def.col+'35';ctx.fill();
  ctx.beginPath();ctx.arc(x,y,def.r,0,Math.PI*2);
  ctx.fillStyle=def.col;ctx.fill();
  ctx.restore();
  const kills=t.kills||0;
  if(kills>0){
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath();ctx.roundRect(x-16,y-def.r-14,32,10,4);ctx.fill();
    ctx.fillStyle='#f1c40f';ctx.font='bold 7px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚔'+kills,x,y-def.r-9);
  }
  ctx.font=`${def.r+4}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(TOWER_ICONS[t.type]||'?',x,y);
}

function draw2(){
  ctx2.clearRect(0,0,W,H);
  enemies.forEach(e=>{
    ctx2.save();ctx2.shadowColor=e.col;ctx2.shadowBlur=18;
    ctx2.beginPath();ctx2.arc(e.x,e.y,e.sz,0,Math.PI*2);ctx2.fillStyle=e.col;ctx2.fill();
    if(e.slow<1){
      ctx2.strokeStyle='#67e8f9';ctx2.lineWidth=3;
      ctx2.beginPath();ctx2.arc(e.x,e.y,e.sz+4,0,Math.PI*2);ctx2.stroke();
    }
    ctx2.restore();
    ctx2.fillStyle='rgba(0,0,0,.8)';
    ctx2.beginPath();ctx2.roundRect(e.x-28,e.y-e.sz-18,56,8,4);ctx2.fill();
    const hpPct=e.hp/e.maxHp;
    ctx2.fillStyle=hpPct>0.6?'#2ed573':hpPct>0.3?'#f39c12':'#e74c3c';
    ctx2.beginPath();ctx2.roundRect(e.x-27,e.y-e.sz-17,Math.max(0,54*hpPct),6,3);ctx2.fill();
    ctx2.fillStyle='rgba(255,255,255,.9)';
    ctx2.font=`bold ${Math.min(e.sz,13)}px Nunito`;
    ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.fillText(e.word,e.x,e.y);
  });
  towers.forEach(t=>{
    const stats=getTowerStats(t);
    if(t===selectedTower){
      ctx2.beginPath();ctx2.arc(t.x,t.y,stats.range,0,Math.PI*2);
      ctx2.strokeStyle='rgba(255,255,255,.14)';ctx2.lineWidth=1.5;ctx2.stroke();
    }
    drawTowerShape(ctx2,t,t.x,t.y,stats);
  });
  if(placing&&mouseX){
    const def=TOWERS[pickType];
    ctx2.beginPath();ctx2.arc(mouseX,mouseY,def.range,0,Math.PI*2);
    ctx2.strokeStyle=def.col+'44';ctx2.lineWidth=1.5;ctx2.stroke();
    ctx2.font=`${def.r+4}px sans-serif`;ctx2.textAlign='center';ctx2.textBaseline='middle';
    ctx2.globalAlpha=0.6;
    ctx2.fillText(TOWER_ICONS[pickType]||'?',mouseX,mouseY);
    ctx2.globalAlpha=1;
  }
  bullets.forEach(b=>{
    ctx2.save();ctx2.shadowColor=b.col;ctx2.shadowBlur=12;
    ctx2.beginPath();ctx2.arc(b.x,b.y,b.sz,0,Math.PI*2);
    ctx2.fillStyle=b.col;ctx2.fill();ctx2.restore();
  });
  parts.forEach(p=>{
    ctx2.globalAlpha=Math.max(0,p.life);
    ctx2.beginPath();ctx2.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx2.fillStyle=p.col;ctx2.fill();
  });
  ctx2.globalAlpha=1;
}

function gameLoop(ts){
  const dt=Math.min(ts-last,50);last=ts;
  if(gs==='playing'){
    if(waveOn)spawnE(dt);
    updE(dt);updT(dt);updB(dt);updP(dt);draw2();
  }
  animId=requestAnimationFrame(gameLoop);
}

function tryPick(type){
  const def=TOWERS[type];
  const unlocked=!def.unlockLvl||playerLevel>=def.unlockLvl;
  if(!unlocked){showNotif(`Reach Level ${def.unlockLvl} to unlock ${def.name}!`);return;}
  if(coins<def.cost){showNotif(`Need ${def.cost} gold for ${def.name}!`);return;}
  selectedTower=null;
  pickType=type;placing=true;
  document.getElementById('hint').style.display='block';
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('btn-'+type).classList.add('selected');
}

function isOnPath(x,y){
  for(let i=0;i<PATH.length-1;i++){
    const px=PATH[i].x,py=PATH[i].y,nx=PATH[i+1].x,ny=PATH[i+1].y;
    const dx=nx-px,dy=ny-py,len=Math.sqrt(dx*dx+dy*dy);
    const t2=Math.max(0,Math.min(1,((x-px)*dx+(y-py)*dy)/(len*len)));
    if(Math.sqrt((x-(px+t2*dx))**2+(y-(py+t2*dy))**2)<36)return true;
  }
  return false;
}

function openUpgrade(tower){
  selectedTower=tower;
  const def=TOWERS[tower.type];
  const paths=UPGRADES[tower.type]||[];
  // ensure upgrades array is correct length
  if(!tower.upgrades||tower.upgrades.length<paths.length){
    tower.upgrades=Array.from({length:paths.length},(_,i)=>tower.upgrades&&tower.upgrades[i]?tower.upgrades[i]:[0]);
  }
  document.getElementById('upg-title').textContent=`${def.icon} ${def.name}`;
  document.getElementById('upg-sub').textContent=`Kills: ${tower.kills||0} · ${def.desc}`;
  const pathsEl=document.getElementById('upg-paths');pathsEl.innerHTML='';
  paths.forEach((path,pi)=>{
    const currentLvl=(tower.upgrades[pi]&&tower.upgrades[pi][0])||0;
    const pathDiv=document.createElement('div');pathDiv.className='upg-path';
    pathDiv.innerHTML=`<div class="upg-path-name">${path.name}</div>`;
    const levelsDiv=document.createElement('div');levelsDiv.className='upg-levels';
    path.levels.forEach((lvl,li)=>{
      const bought=li<currentLvl;
      const isNext=li===currentLvl;
      const locked=li>currentLvl;
      const div=document.createElement('div');
      div.className='upg-lvl'+(bought?' bought':locked?' locked-upg':'');
      div.innerHTML=`<div>${lvl.name}</div><div style="font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px">${lvl.desc}</div>${!bought?`<div class="cost">${lvl.cost}g</div>`:'<div style="color:#2ed573;font-size:10px">✓</div>'}`;
      if(isNext&&!bought){
        div.onclick=()=>{
          if(coins<lvl.cost){showNotif('Not enough gold!');return;}
          coins-=lvl.cost;
          if(!tower.upgrades[pi])tower.upgrades[pi]=[0];
          tower.upgrades[pi][0]=(tower.upgrades[pi][0]||0)+1;
          updateUI();openUpgrade(tower);
          spawnParts(tower.x,tower.y,TOWERS[tower.type].col,10);
        };
      }
      levelsDiv.appendChild(div);
    });
    pathDiv.appendChild(levelsDiv);pathsEl.appendChild(pathDiv);
  });
  document.getElementById('sell-btn').onclick=()=>{
    const sellPrice=Math.floor(TOWERS[tower.type].cost*0.6);
    coins+=sellPrice;towers=towers.filter(t=>t!==tower);
    updateUI();closeUpgrade();showNotif(`Sold for ${sellPrice}g`);
  };
  document.getElementById('upgrade-panel').style.display='flex';
}

function closeUpgrade(){
  document.getElementById('upgrade-panel').style.display='none';
  selectedTower=null;
}

function showWave(w,cb){
  const el=document.getElementById('wave-flash');
  el.textContent=`WAVE ${w}`;el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';setTimeout(cb,500);},1600);
}

function updateUI(){
  document.getElementById('ui-coins').textContent=coins;
  document.getElementById('ui-wave').textContent=wave;
  document.getElementById('ui-score').textContent=score;
  document.getElementById('hc').textContent=hearts;
  renderShop();
}

function gameOver(){
  saveProgress();
  gs='gameover';
  document.getElementById('go').style.display='flex';
  document.getElementById('go-stats').innerHTML=`Wave ${wave}<br>Score ${score}<br>Level ${playerLevel}`;
  musicOn=false;stopMusic();
}

// ─── Music ───
const MELODY=[0,4,7,12,7,4,0,4,5,9,12,9,5,4,7,11,14,11,7,4];
let melodyIdx=0;

function startMusic(){
  if(!musicOn)return;
  try{
    if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    audioCtx.resume().then(()=>playMelody());
  }catch(e){}
}

function noteFreq(semitone){return 130.81*Math.pow(2,semitone/12);}

function playMelody(){
  if(!musicOn||!audioCtx)return;
  const semitone=MELODY[melodyIdx%MELODY.length];melodyIdx++;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  osc.frequency.value=noteFreq(semitone);
  osc.type='sine';
  gain.gain.setValueAtTime(0.08,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  osc.start(t);osc.stop(t+0.6);
  const pad=audioCtx.createOscillator();
  const padGain=audioCtx.createGain();
  pad.connect(padGain);padGain.connect(audioCtx.destination);
  pad.frequency.value=noteFreq(semitone-12);
  pad.type='triangle';
  padGain.gain.setValueAtTime(0.03,t);
  padGain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  pad.start(t);pad.stop(t+0.5);
  musicTimer=setTimeout(playMelody,340);
}

function stopMusic(){
  if(musicTimer)clearTimeout(musicTimer);
  musicTimer=null;
  if(audioCtx){try{audioCtx.close();}catch(e){}audioCtx=null;}
}

function toggleMusic(){
  if(musicOn){
    musicOn=false;stopMusic();
    document.getElementById('music-btn').textContent='🔇';
  } else {
    musicOn=true;
    document.getElementById('music-btn').textContent='🎵';
    startMusic();
  }
}

  function saveProgress(){
  localStorage.setItem('babel_save',JSON.stringify({
    playerLevel,playerXP,wave,coins,score,lang,diff
  }));
}

function loadProgress(){
  try{
    const s=JSON.parse(localStorage.getItem('babel_save'));
    if(s){
      playerLevel=s.playerLevel||1;
      playerXP=s.playerXP||0;
      wave=s.wave||1;
      coins=s.coins||250;
      lang=s.lang||'korean';
      diff=s.diff||'basic';
    }
  }catch(e){}
}
window.addEventListener('resize',()=>{initCanvas();});
if(window.speechSynthesis)window.speechSynthesis.getVoices();
loadProgress();
  initCanvas();
</script>
